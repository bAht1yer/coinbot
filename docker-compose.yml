version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: coinbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coinbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: coinbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U coinbot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Trading Bot Runner
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coinbot-runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://coinbot:${DB_PASSWORD:-changeme}@postgres:5432/coinbot?schema=public
      NODE_ENV: production
      # Add your Coinbase API credentials
      COINBASE_API_KEY: ${COINBASE_API_KEY}
      COINBASE_API_SECRET: ${COINBASE_API_SECRET}
    volumes:
      # Mount logs if needed
      - ./logs:/app/logs
    # Uncomment if you want to expose a health check endpoint
    # ports:
    #   - "3000:3000"

volumes:
  postgres_data:
    driver: local
